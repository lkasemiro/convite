<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Convite Especial</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
</head>
<body>

    <div id="tela-convite" class="card">
        <div class="icon-header">✨</div>
        <h2>Se você não tiver nenhuma viagem marcada para ver minas e igrejas esse mês...</h2>
        <p>O que você acha de fazer alguma coisa comigo? 👀</p>
        <div class="btn-container">
            <button id="btn-sim" onclick="aceitou()">Com certeza! </button>
            <button id="btn-nao" onmouseover="fugirBotao()" onclick="clicouNoNao()">Não ❌</button>
        </div>
    </div>

    <div id="tela-opcoes" class="card hidden">
        <div class="icon-header">📅</div>
        <h2>Sabia! Vamos organizar as coisas:</h2>
        
        <label for="data">Que dia fica melhor para você?</label>
        <input type="date" id="data" min="2026-06-01" max="2026-06-30">

        <label>O que você quer fazer?</label>
        <div class="opcoes-container">
            <label><input type="radio" name="role" value="Feira + Comida boa" onclick="toggleSugestao(false)"> 🎪 Feira + Comida boa</label>
            <label><input type="radio" name="role" value="Tomar um chopp de vinho" onclick="toggleSugestao(false)"> 🍷 Tomar um chopp de vinho</label>
            <label><input type="radio" name="role" value="Karaokê" onclick="toggleSugestao(false)"> 🎤 Karaokê de qualidade duvidosa</label>
            <label><input type="radio" name="role" value="Festa Junina" onclick="toggleSugestao(false)"> 🌽 Festa Junina</label>
            <label><input type="radio" name="role" value="Passeio de bike" onclick="toggleSugestao(false)"> 🚲 Passeio de bike</label>
            <label><input type="radio" name="role" value="Ver um jogo da Copa" onclick="toggleSugestao(false)"> ⚽ Ver um jogo da Copa</label>
            <label><input type="radio" name="role" value="Cinema e Jantar" onclick="toggleSugestao(false)"> 🍽️ Cinema e Jantar</label>
            <label><input type="radio" name="role" value="Outra coisa" id="opcao-outro" onclick="toggleSugestao(true)"> ✏️ Outra coisa... (Quero sugerir)</label>
        </div>

       <div id="container-sugestao" class="hidden">
            <label for="sugestao-texto">O que você tem em mente? 🧠</label>
            <textarea id="sugestao-texto" rows="3" placeholder="Escreve aqui sua ideia de rolê com detalhes..."></textarea>
        </div>

        <button id="btn-enviar" onclick="enviarResposta()">its a date? 🚀</button>
    </div>

    <script src="script.js?v=2"></script>
</body>
</html>
